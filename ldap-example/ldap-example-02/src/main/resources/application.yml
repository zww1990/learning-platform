server:
  port: 8080
  servlet:
    context-path: /
    jsp:
      registered: false
  ssl:
    enabled: false

spring:
  aop:
    auto: false
  dao:
    exceptiontranslation:
      enabled: false
  jackson:
    locale: zh_CN
    time-zone: GMT+8
  ldap:
    #LDAP连接
    urls: 
    #LDAP节点
    base: 
    #LDAP用户名
    username: 
    #LDAP密码
    password: 
  mail:
    #SMTP邮箱地址
    host: 
    #SMTP邮箱端口（建议使用安全协议的端口号）
    port: 
    #SMTP邮箱用户名
    username: 
    #SMTP邮箱密码
    password: 
    properties:
      mail:
        smtp:
          ssl:
            enable: true
  main:
    allow-bean-definition-overriding: true
  mvc:
    publish-request-handled-events: false
  servlet:
    multipart:
      enabled: false
  thymeleaf:
#    cache: false
    check-template: false
    check-template-location: false
  datasource:
    #数据库连接
    url: 
    #数据库用户名
    username: 
    #数据库密码
    password: 
  sql:
    init:
      enabled: false
  jmx:
    enabled: false

changepwd:
  #创建密码
  create:
    #链接有效期（单位：分钟）
    expiration: 4320
    #发件人（${}是占位符，请谨慎修改）
    from: Admin（请勿回复）<${spring.mail.username}>
    #邮件主题
    subject: 配置账号创建通知（涉及SVN、GIT、JIRA、WIKI、Jenkins）
    #邮件内容（%s是占位符，请谨慎修改）
    text: '%s，您好：<br><br>您的配置账号已创建，适用系统（SVN、GIT、JIRA、WIKI、Jenkins等）。<br><br>用户名：%s<br><br>请点击下方链接重置密码。<br><br><a href="%s" target="_blank">%s</a><br><br>如无配置账号需求，请忽略此邮件。'
  #重置密码
  reset:
    #链接有效期（单位：分钟）
    expiration: 30
    #发件人（${}是占位符，请谨慎修改）
    from: Admin（请勿回复）<${spring.mail.username}>
    #邮件主题
    subject: 配置密码重置（涉及SVN、GIT、JIRA、WIKI、Jenkins）
    #邮件内容（%s是占位符，请谨慎修改）
    text: '%s 您好，<br><br>点击以下链接重置您的密码，该链接${changepwd.reset.expiration}分钟后失效：<br><br><a href="%s" target="_blank">%s</a><br><br>如果您没有请求修改密码，请忽略该邮件。'
  #修改密码
  update:
    #发件人（${}是占位符，请谨慎修改）
    from: Admin（请勿回复）<${spring.mail.username}>
    #邮件主题
    subject: 配置密码修改（涉及SVN、GIT、JIRA、WIKI、Jenkins）
    #邮件内容（%s是占位符，请谨慎修改）
    text: '%s 您好，<br><br>您的密码已修改。<br><br>如果您没有修改密码，请立即联系您的管理员。'
  first:
    cron: '59 59 11 * * ?'
    begin: '00:00:00'
    end: '23:59:59'
  second:
    cron: '59 59 19 * * ?'
    begin: '00:00:00'
    end: '23:59:59'
  third:
    cron: '59 59 23 * * ?'
    begin: '00:00:00'
    end: '23:59:59'
  #新用户默认密码
  default-password: 
  #gitlab地址
  gitlab-url: 
  #jira地址
  jira-url: 
  #jira用户目录同步地址
  jira-sync-url: 
  #jira管理员用户
  jira-admin-username: 
  #jira管理员密码
  jira-admin-password: 
